name: misspell

on:
  push:
    branches:
      - master
    paths:
      - '**.md'
  pull_request:
    types: [opened, synchronize, reopened]
    paths:
      - '**.md'

permissions:
  contents: read

jobs:
  misspell:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: misspell
        uses: reviewdog/action-misspell@d6429416b12b09b4e2768307d53bef58d172e962 # v1
        with:
          locale: "US"
